name: deploy-book

# Run this when the main branch changes
on:
  push:
    branches:
    - main
    # If your git repository has the Jupyter Book within some-subfolder next to
    # unrelated files, you can make this run only if a file within that specific
    # folder has been modified.
    #
    # paths:
    # - book/**

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
    # Install ubuntu deps
    - name: Install ubuntu deps
            run: sudo apt-get install -y --no-install-recommends \
              # git-core \
              # libssl-dev \
              libcurl4-openssl-dev 
              # libcurl4-gnutls-dev \
              # curl \
              # libsodium-dev \
              # libxml2-dev

    # Install dependencies
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
        
    - name: Set up R
      uses: r-lib/actions/setup-r@v2

    - name: Install IRkernel
      run: |
        Rscript -e 'install.packages(c("IRkernel", "rmarkdown"))'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Print kernelspec version
      run: |
        jupyter kernelspec --version

    - name: Print all kernels
      run: |
        jupyter kernelspec list

    - name: Register IRkernel
      run: |
        Rscript -e "IRkernel::installspec()"

    - name: Print all kernels again
      run: |
        jupyter kernelspec list
        
    - name: Install R_requirements
      run: |
        Rscript install_dependencies.R
    # - name: Install R_requirements
    #   uses: r-lib/actions/setup-pandoc@v2
    #  with:
    #    pandoc-version: '3.1.11' # The pandoc version to download (if necessary) and use.
    # - run: echo "# Test" | pandoc -t html

    
    # (optional) Cache your executed notebooks between runs
    # if you have config:
    # execute:
    #   execute_notebooks: cache
    - name: cache executed notebooks
      uses: actions/cache@v4
      with:
        path: _build/.jupyter_cache
        key: jupyter-book-cache-${{ hashFiles('requirements.txt') }}

    # Build the book
    - name: Build the book
      run: |
        jupyter-book build .

    # Upload the book's HTML as an artifact
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: "_build/html"

    # Deploy the book's HTML to GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
